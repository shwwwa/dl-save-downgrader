<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save Downgrader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Save Downgrader</h1>
  <p>Drag & Drop your .sav file to downgrade it automatically from 1.55 to 1.47</p>

  <div id="dropZone">
    <p>Drop file here</p>
    <input type="file" id="fileInput" accept=".sav">
  </div>

  <button onclick="processFile()">Convert</button>

  <p id="status"></p>
</div>

<script src="script.js"></script>
<!-- gzip library -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

</body>
</html>
