<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save Downgrader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Save Downgrader</h1>
<p>Upload your .sav file to downgrade it automatically from 1.55 to 1.47</p>

<input type="file" id="fileInput" accept=".sav">
<button onclick="processFile()">Convert</button>

<p id="status"></p>

<script src="script.js"></script>
<!-- gzip library -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

</body>
</html>
